<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

    <main class="calculator-wrapper" aria-label="Calculator Application">
    <div class="glow glow--teal"  aria-hidden="true"></div>
    <div class="glow glow--amber" aria-hidden="true"></div>
    <section class="calculator" role="application" aria-label="Calculator">

      <div class="display" aria-live="polite" aria-label="Calculator display">
      
        <div class="display__history" id="history" aria-label="Expression history"></div>
        <div class="display__value"  id="display">0</div>
      </div>
      <div class="btn-grid" role="group" aria-label="Calculator buttons">

        <button class="btn btn--util"   data-action="clear"   aria-label="Clear all">C</button>
        <button class="btn btn--delete" data-action="delete"  aria-label="Delete last digit">⌫</button>
        <button class="btn btn--util"   data-action="percent" aria-label="Percentage">%</button>
        <button class="btn btn--op"     data-action="divide"  aria-label="Divide">÷</button>


        <button class="btn btn--num"   data-action="num" data-value="7" aria-label="7">7</button>
        <button class="btn btn--num"   data-action="num" data-value="8" aria-label="8">8</button>
        <button class="btn btn--num"   data-action="num" data-value="9" aria-label="9">9</button>
        <button class="btn btn--op"    data-action="multiply" aria-label="Multiply">×</button>

        <button class="btn btn--num"   data-action="num" data-value="4" aria-label="4">4</button>
        <button class="btn btn--num"   data-action="num" data-value="5" aria-label="5">5</button>
        <button class="btn btn--num"   data-action="num" data-value="6" aria-label="6">6</button>
        <button class="btn btn--op"    data-action="subtract" aria-label="Subtract">−</button>

        <button class="btn btn--num"   data-action="num" data-value="1" aria-label="1">1</button>
        <button class="btn btn--num"   data-action="num" data-value="2" aria-label="2">2</button>
        <button class="btn btn--num"   data-action="num" data-value="3" aria-label="3">3</button>
        <button class="btn btn--op"    data-action="add" aria-label="Add">+</button>

        <button class="btn btn--num btn--zero" data-action="num" data-value="0" aria-label="0">0</button>
        <button class="btn btn--num"    data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn--eq"     data-action="equals"  aria-label="Equals">=</button>

      </div>

    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
